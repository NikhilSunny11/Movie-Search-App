name: Deploy to Vercel

on:
  push:
    branches: [main]

# Only run after CI passes
# Note: Requires Vercel project linked to this repo
# Set these secrets in GitHub: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: []  # Add 'test-server' and 'test-client' job names if combining with ci.yml
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
